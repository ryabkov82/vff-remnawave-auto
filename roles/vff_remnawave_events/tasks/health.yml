---
- name: Wait for vff-remnawave-events healthcheck
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/healthz"
    method: GET
    status_code: 200
    timeout: 5
  register: _vff_remnawave_events_health
  retries: 20
  delay: 3
  until: _vff_remnawave_events_health.status == 200
  when: vff_remnawave_events_enabled | bool
