# Хост(ы) отдельной страницы подписки
#remnawave_sub_public_domain: sub.vpn-for-friends.com
#cf_dns_zone: "vpn-for-friends.com"
#cf_dns_target_ip: "203.0.113.55"   # публичный IP сервера subscription

remnawave_sub_deploy_mode: separate

remnawave_sub_public_domain: sub.vpn-for-friends.com
remnawave_sub_app_port: 3010

remnawave_sub_image: "remnawave/subscription-page@sha256:ed680e166622e1ac834fd23669228cd7b28933b117e0a1f5f0c2d1285d9cf9be"

# Панель как внешний URL (важно)
remnawave_panel_frontend_domain: remna.vpn-for-friends.com
remnawave_sub_use_local_docker_dns: false

# TLS / certs
remnawave_sub_tls_mode: "letsencrypt_dns01"
nginx_tls_mode: "{{ remnawave_sub_tls_mode }}"
cf_dns_zone: "vpn-for-friends.com"
cf_dns_api_token: "{{ vault_cf_dns_api_token }}"
cf_dns_target_ip: "91.184.245.69"

# включаем legacy-режим в subscription-page
remnawave_sub_marzban_legacy_enabled: true

# из базы Marzban: SELECT secret_key FROM jwt LIMIT 1;
remnawave_sub_marzban_secret_key: "{{ vault_marzban_secret_key }}"

remnawave_sub_marzban_custom_sub_prefix: "sub"

# включаем nginx vhost для marzban-ссылок
remnawave_sub_marzban_legacy_domain: "marzban-s2.vpn-for-friends.com"
remnawave_sub_legacy_domain: "marzban-s2.vpn-for-friends.com"


remnawave_nginx_bind_address: "0.0.0.0"
remnawave_nginx_external_https_port: 4443
