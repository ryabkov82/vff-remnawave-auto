remnawave_node_write_env: true
remnawave_node_port: 2222
remnawave_node_env_content: |
  NODE_PORT={{ remnawave_node_port }}
  SECRET_KEY={{ remnawave_secret_key }}

remnawave_node_address: "77.239.127.199"
remnawave_node_name: "{{ inventory_hostname }}"

remnawave_node_country_code: "DE"

remnawave_hosts:
  - remark: "🇩🇪 1 vpn-for-friends"
    address: "edge-fra-01.digitalstreamers.xyz"
    # inbound resolution
    inbound_tag: "VLESS TCP REALITY (DS)"
    # SNI для Reality
    sni:
      - "edge-fra-01.digitalstreamers.xyz"
      - "stream-fra-01.digitalstreamers.xyz"
      - "cache-fra-01.digitalstreamers.xyz"
      - "segment-fra-01.digitalstreamers.xyz"

# Набор записей для этой ноды
cf_dns_records:
  - { name: "www",               type: "A", proxied: false }
  - { name: "site",              type: "A", proxied: false }
  - { name: "edge-fra-01",       type: "A", proxied: false }
  - { name: "stream-fra-01",     type: "A", proxied: false }
  - { name: "cache-fra-01",      type: "A", proxied: false }
  - { name: "segment-fra-01",    type: "A", proxied: false }      

# домены, по которым нода должна отдавать свой nginx (через HAProxy)
haproxy_node_nginx_sni_domains:
  - site.digitalstreamers.xyz
  - www.digitalstreamers.xyz

# адрес nginx на ноде (тот же, что nginx_https_bind в remnawave_node_nginx)
haproxy_node_nginx_host: "127.0.0.1"
haproxy_node_nginx_port: 4443
